<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>BNB 5m Market Samples</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --border: #30363d; --txt: #c9d1d9; --muted: #8b949e;
  --blue: #58a6ff; --green: #3fb950; --red: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--txt);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  padding: 20px 24px; }
.header { display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
.header h1 { font-size: 1.25rem; font-weight: 600; }
.muted { color: var(--muted); font-size: 0.875rem; }
.nav { display: flex; gap: 12px; }
.nav a { color: var(--blue); text-decoration: none; padding: 4px 10px;
  border-radius: 4px; font-size: 0.875rem; }
.nav a:hover { background: var(--bg3); }
.nav a.active { background: var(--bg2); color: var(--txt); font-weight: 600; }
.controls { display: flex; gap: 12px; align-items: center; margin: 12px 0 20px;
  flex-wrap: wrap; }
select, button { background: var(--bg2); color: var(--txt);
  border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px;
  font-family: inherit; font-size: 0.875rem; }
button { cursor: pointer; }
button:hover { background: var(--bg3); }
.list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px; }
.item { background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 12px; cursor: pointer; }
.item:hover { background: var(--bg3); }
.item .slug { font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: 0.8rem; color: var(--muted); }
.item .winner { font-size: 0.875rem; font-weight: 600; margin-top: 4px; }
.winner.Up { color: var(--green); }
.winner.Down { color: var(--red); }
.winner.unknown, .winner.null { color: var(--muted); }
.chart { background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 16px; margin-top: 16px; }
canvas { width: 100%; height: 360px; background: var(--bg); }
.pager { display: flex; gap: 8px; margin-top: 16px; align-items: center; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>BNB 5m Market Samples</h1>
    <div class="muted" id="meta">Loading...</div>
  </div>
  <div class="nav">
    <a href="../doge/">doge</a>
    <a href="../hype/">hype</a>
    <a href="../eth/">eth</a>
    <a href="../bnb/">bnb</a>
  </div>
</div>

<div class="controls">
  <label class="muted">Filter:</label>
  <select id="winnerFilter">
    <option value="all">All</option>
    <option value="Up">Up wins</option>
    <option value="Down">Down wins</option>
    <option value="unknown">Unknown</option>
  </select>
  <button id="reload">Reload</button>
</div>

<div id="loading" class="muted">Loading index.json...</div>
<div id="list" class="list"></div>
<div id="chart" class="chart" style="display:none">
  <div id="chartTitle" class="muted"></div>
  <canvas id="canvas"></canvas>
  <div class="pager">
    <button id="back">← Back to list</button>
  </div>
</div>

<script>
const MARKET = "bnb";
const INDEX_PATH = "./index.json";
const DATA_BASE = "../../csv/" + MARKET + "/";

let windows = [];
let filter = "all";

async function loadIndex() {
  document.getElementById("loading").style.display = "block";
  try {
    const r = await fetch(INDEX_PATH + "?t=" + Date.now());
    const d = await r.json();
    windows = d.windows || [];
    document.getElementById("meta").textContent =
      d.count + " windows — last updated " + new Date(d.generated_at).toLocaleString();
  } catch (e) {
    document.getElementById("meta").textContent = "Failed to load index.json: " + e;
  }
  render();
  document.getElementById("loading").style.display = "none";
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const filtered = windows.filter(w => {
    if (filter === "all") return true;
    if (filter === "unknown") return !w.winner || w.winner === "unknown";
    return w.winner === filter;
  });
  for (const w of filtered) {
    const div = document.createElement("div");
    div.className = "item";
    const winnerCls = (w.winner || "unknown");
    div.innerHTML = `<div class="slug">${w.slug}</div>
      <div class="winner ${winnerCls}">${w.winner || "unknown"}</div>`;
    div.onclick = () => showChart(w);
    list.appendChild(div);
  }
}

async function showChart(w) {
  document.getElementById("chart").style.display = "block";
  document.getElementById("list").style.display = "none";
  document.getElementById("chartTitle").textContent =
    w.slug + "  —  winner: " + (w.winner || "unknown");
  const r = await fetch(DATA_BASE + w.filename);
  const text = await r.text();
  drawCsv(text);
}

function drawCsv(text) {
  const lines = text.trim().split("\n").filter(l => l && !l.startsWith("#"));
  if (lines.length < 2) return;
  const header = lines[0].split(",");
  const priceIdx = header.findIndex(c => c.endsWith("_price"));
  const elapsedIdx = header.indexOf("elapsed_sec");
  const upBidIdx = header.indexOf("up_bid_p1");
  const upAskIdx = header.indexOf("up_ask_p1");

  const rows = lines.slice(1).map(l => l.split(","));
  const points = rows.map(r => ({
    t: parseFloat(r[elapsedIdx]),
    price: parseFloat(r[priceIdx]),
    up_bid: parseFloat(r[upBidIdx]),
    up_ask: parseFloat(r[upAskIdx]),
  })).filter(p => !isNaN(p.t));

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width = canvas.clientWidth;
  const H = canvas.height = canvas.clientHeight;
  ctx.clearRect(0, 0, W, H);

  const tMin = 0, tMax = 300;
  const prices = points.map(p => p.price).filter(v => !isNaN(v));
  if (!prices.length) return;
  const pMin = Math.min(...prices), pMax = Math.max(...prices);
  const pad = (pMax - pMin) * 0.05 || 1;

  const xOf = t => ((t - tMin) / (tMax - tMin)) * (W - 60) + 40;
  const yOf = v => H - 30 - ((v - (pMin - pad)) / ((pMax + pad) - (pMin - pad))) * (H - 60);

  // Price line
  ctx.strokeStyle = "#58a6ff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  points.forEach((p, i) => {
    if (isNaN(p.price)) return;
    const x = xOf(p.t), y = yOf(p.price);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Axes
  ctx.strokeStyle = "#30363d";
  ctx.strokeRect(40, 20, W - 60, H - 50);

  ctx.fillStyle = "#8b949e";
  ctx.font = "11px ui-monospace";
  ctx.fillText(pMax.toFixed(2), 4, 24);
  ctx.fillText(pMin.toFixed(2), 4, H - 30);
  ctx.fillText("t=0s", 40, H - 10);
  ctx.fillText("t=300s", W - 60, H - 10);
}

document.getElementById("winnerFilter").onchange = (e) => {
  filter = e.target.value; render();
};
document.getElementById("reload").onclick = loadIndex;
document.getElementById("back").onclick = () => {
  document.getElementById("chart").style.display = "none";
  document.getElementById("list").style.display = "grid";
};

// Mark current nav link active
document.querySelectorAll(".nav a").forEach(a => {
  if (a.getAttribute("href").includes(MARKET)) a.classList.add("active");
});

loadIndex();
</script>
</body>
</html>
